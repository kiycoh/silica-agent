<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 1000" font-family="Inter, system-ui, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Silica architecture schematic">
  <defs>
    <marker id="ac" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#38bdf8"/></marker>
    <marker id="ad" markerWidth="9" markerHeight="9" refX="7" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#6e7681"/></marker>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.03"/></pattern>
    <style>
      .mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}
      .title{font-size:31px;font-weight:800;fill:#e6edf3;letter-spacing:1px}
      .tag{font-size:12.5px;fill:#9aa4b0}
      .band{font-size:11px;font-weight:700;fill:#38bdf8;letter-spacing:2.5px}
      .hdr{font-size:13px;font-weight:700;fill:#e6edf3}
      .sub{font-size:10.5px;fill:#9aa4b0}
      .chip{font-size:9px;font-weight:700;fill:#d7e3ee}
      .kh{font-size:11.5px;font-weight:700;fill:#e6edf3;letter-spacing:.5px}
      .kb{font-size:9.5px;fill:#8b949e}
      .note{font-size:9.5px;fill:#6e7681}
      .amber{fill:#f0883e}
      .leg{font-size:10px;fill:#8b949e}
      .cy{fill:#38bdf8}
    </style>
  </defs>

  <!-- panel -->
  <rect x="6" y="6" width="1148" height="988" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <rect x="6" y="6" width="1148" height="988" fill="url(#dots)"/>
  <rect x="6" y="6" width="1148" height="4" fill="#38bdf8"/>

  <!-- header -->
  <text x="44" y="54" class="title">SILICA</text>
  <text x="44" y="76" class="tag">Deterministic, local-first orchestrator for knowledge vaults — <tspan fill="#cdd5df">not a free-form agent loop</tspan>.</text>
  <!-- legend -->
  <rect x="770" y="36" width="16" height="8" fill="#38bdf8"/><text x="792" y="44" class="leg">control / data flow</text>
  <rect x="770" y="56" width="16" height="8" fill="#241a10" stroke="#f0883e"/><text x="792" y="64" class="leg">safety gate · rollback</text>
  <line x1="946" y1="60" x2="978" y2="60" stroke="#6e7681" stroke-dasharray="3 3"/><text x="984" y="64" class="leg">read</text>

  <line x1="44" y1="90" x2="1116" y2="90" stroke="#30363d"/>

  <!-- ============ INTERFACES ============ -->
  <text x="44" y="120" class="band">INTERFACES</text>
  <rect x="44" y="132" width="300" height="52" class="card" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="156" class="hdr">REPL</text><text x="60" y="172" class="sub">Rich TUI · streaming · slash-commands</text>
  <rect x="364" y="132" width="320" height="52" class="card" fill="#161b22" stroke="#30363d"/>
  <text x="380" y="156" class="hdr">Web GUI</text><text x="380" y="172" class="sub">FastAPI + SSE · chat-first · graph view</text>

  <path d="M194,184 L194,215" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <path d="M524,184 L524,215" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>

  <!-- ============ AGENT LOOP ============ -->
  <text x="44" y="210" class="band">AGENT LOOP</text>
  <rect x="44" y="220" width="1072" height="64" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="242" class="hdr">Conversational orchestrator <tspan class="sub" font-weight="400">· litellm · tool dispatch · context compaction</tspan></text>
  <text x="60" y="261" class="sub"><tspan class="cy" font-weight="700">agent-directed → FSM:</tspan>  <tspan class="mono">/ingest</tspan> · <tspan class="mono">/organize</tspan> · <tspan class="mono">/report</tspan></text>
  <text x="60" y="277" class="sub"><tspan fill="#6e7681" font-weight="700">direct (no LLM) → kernel:</tspan>  <tspan class="mono">/find /graph /embed /cooccur /map /find /status /undo /revert</tspan></text>

  <path d="M580,284 L580,315" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="588" y="303" class="note">start ingest run</text>

  <!-- ============ SOURCES ============ -->
  <text x="44" y="310" class="band">INGRESS · SOURCES (adapters)</text>
  <rect x="44" y="320" width="1072" height="54" fill="#12161d" stroke="#30363d"/>
  <rect x="60" y="336" width="150" height="22" fill="#0e2230" stroke="#245a72"/><text x="135" y="351" class="chip mono" text-anchor="middle">prose</text>
  <rect x="222" y="336" width="150" height="22" fill="#0e2230" stroke="#245a72"/><text x="297" y="351" class="chip mono" text-anchor="middle">code (AST)</text>
  <rect x="384" y="336" width="150" height="22" fill="#0e2230" stroke="#245a72"/><text x="459" y="351" class="chip mono" text-anchor="middle">convert · pdf/docx</text>
  <rect x="546" y="336" width="150" height="22" fill="#0e2230" stroke="#245a72"/><text x="621" y="351" class="chip mono" text-anchor="middle">web-research · tavily</text>
  <text x="720" y="351" class="sub">→ normalize → <tspan class="mono" fill="#cdd5df">Inbox/</tspan>  ·  <tspan class="amber">zero-trust staging</tspan> (never injected directly)</text>

  <path d="M444,374 L444,407" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="452" y="394" class="note">staged files</text>

  <!-- ============ INJECTOR FSM + CAPABILITIES ============ -->
  <text x="44" y="400" class="band">INGEST PIPELINE</text>

  <!-- FSM hero -->
  <rect x="44" y="410" width="800" height="152" fill="#111a24" stroke="#38bdf8" stroke-width="1.4"/>
  <text x="60" y="431" class="hdr">Injector FSM <tspan class="sub" font-weight="400">· deterministic · per-file · gate-guarded · reversible</tspan></text>

  <!-- rails behind chips -->
  <line x1="64" y1="464" x2="824" y2="464" stroke="#245a72" stroke-width="1"/>
  <line x1="64" y1="512" x2="824" y2="512" stroke="#245a72" stroke-width="1"/>

  <!-- row 1 -->
  <g text-anchor="middle">
    <rect x="64"  y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="108" y="468" class="chip mono">RECON</text>
    <rect x="160" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="204" y="468" class="chip mono">CROSS-DEDUP</text>
    <rect x="256" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="300" y="468" class="chip mono">PAYLOAD</text>
    <rect x="352" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="396" y="468" class="chip mono">SALIENCE</text>
    <rect x="448" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="492" y="468" class="chip mono">COLLISION</text>
    <rect x="544" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="588" y="464" class="chip mono">DISTILL</text><text x="588" y="472.5" class="chip mono cy" font-size="7">▲ LLM</text>
    <rect x="640" y="452" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="684" y="468" class="chip mono">SANITIZE</text>
    <rect x="736" y="452" width="88" height="24" fill="#241a10" stroke="#f0883e" stroke-width="1.2"/><text x="780" y="468" class="chip mono amber">VALIDATE</text>
  </g>
  <!-- wrap bus row1 -> row2 -->
  <path d="M824,464 L836,464 L836,488 L52,488 L52,512 L62,512" stroke="#38bdf8" stroke-width="1.3" fill="none" marker-end="url(#ac)"/>

  <!-- row 2 -->
  <g text-anchor="middle">
    <rect x="64"  y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="108" y="516" class="chip mono">SNAPSHOT</text>
    <rect x="160" y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="204" y="516" class="chip mono">WRITE</text>
    <rect x="256" y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="300" y="516" class="chip mono">HUB-UPDATE</text>
    <rect x="352" y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="396" y="516" class="chip mono">AUTOLINK</text>
    <rect x="448" y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="492" y="516" class="chip mono">BACKLINK</text>
    <rect x="544" y="500" width="88" height="24" fill="#241a10" stroke="#f0883e" stroke-width="1.2"/><text x="588" y="516" class="chip mono amber">LINT</text>
    <rect x="640" y="500" width="88" height="24" fill="#0e2230" stroke="#245a72"/><text x="684" y="516" class="chip mono">CLEANUP</text>
    <rect x="736" y="500" width="88" height="24" fill="#0e2a1c" stroke="#2ea043"/><text x="780" y="516" class="chip mono" fill="#7ee2a0">DONE</text>
  </g>

  <text x="60" y="544" class="note"><tspan class="amber" font-weight="700">gate fails →</tspan> ROLLBACK: apply inverse ops · restore pre-write snapshot</text>
  <text x="824" y="544" class="note" text-anchor="end">sibling: Organize FSM · Refiner flows</text>

  <!-- Capabilities -->
  <rect x="864" y="410" width="252" height="152" fill="#171c26" stroke="#30363d"/>
  <text x="880" y="431" class="hdr">Capabilities</text>
  <text x="880" y="447" class="note">leashed sub-agents · worker model · concurrent</text>
  <g text-anchor="middle">
    <rect x="880" y="456" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="933" y="470" class="chip mono">dedup</text>
    <rect x="994" y="456" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="1047" y="470" class="chip mono">refine</text>
    <rect x="880" y="482" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="933" y="496" class="chip mono">enrich</text>
    <rect x="994" y="482" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="1047" y="496" class="chip mono">expand</text>
    <rect x="880" y="508" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="933" y="522" class="chip mono">orphan</text>
    <rect x="994" y="508" width="106" height="20" fill="#161b22" stroke="#30363d"/><text x="1047" y="522" class="chip mono">reader/router</text>
  </g>
  <text x="880" y="543" class="note">fed by FSM work-queue + <tspan class="mono">/dedup /refine /enrich</tspan></text>

  <path d="M844,486 L862,486" stroke="#38bdf8" stroke-width="1.4" fill="none" marker-end="url(#ac)"/>
  <text x="853" y="480" class="note" text-anchor="middle">work items</text>

  <!-- FSM/CAP -> kernel -->
  <path d="M307,562 L307,595" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="315" y="582" class="note">ops · reads</text>
  <path d="M990,562 L990,595" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="998" y="582" class="note">calls</text>

  <!-- ============ KERNEL ============ -->
  <text x="44" y="588" class="band">KERNEL</text>
  <rect x="44" y="598" width="1072" height="150" fill="#12161d" stroke="#30363d"/>

  <!-- 5 cards -->
  <g>
    <rect x="60" y="610" width="195" height="126" fill="#161b22" stroke="#232a35"/>
    <text x="72" y="631" class="kh">RELATEDNESS</text>
    <text x="72" y="651" class="kb">Embeddings ⊕ Co-occurrence</text>
    <text x="72" y="668" class="kb">RRF fusion · abstain-aware</text>
    <text x="72" y="685" class="kb">degrades to survivor leg</text>
    <text x="72" y="702" class="kb mono">embed:0.83 · cooccur:w9</text>
    <text x="72" y="723" class="note">semantic + author signal</text>
  </g>
  <g>
    <rect x="271" y="610" width="195" height="126" fill="#161b22" stroke="#232a35"/>
    <text x="283" y="631" class="kh">GRAPH</text>
    <text x="283" y="651" class="kb">co-occurrence graph</text>
    <text x="283" y="668" class="kb">Louvain communities</text>
    <text x="283" y="685" class="kb">report · delta · god-nodes</text>
    <text x="283" y="702" class="kb">mindmap · autolink</text>
    <text x="283" y="723" class="note">1k+ notes &lt; 10s</text>
  </g>
  <g>
    <rect x="482" y="610" width="195" height="126" fill="#161b22" stroke="#232a35"/>
    <text x="494" y="631" class="kh">TEXT · NLP</text>
    <text x="494" y="651" class="kb">keyphrase (YAKE)</text>
    <text x="494" y="668" class="kb">title · language authority</text>
    <text x="494" y="685" class="kb">classify · partition</text>
    <text x="494" y="702" class="kb">sanitize · lint · contested</text>
    <text x="494" y="723" class="note">per-note multilingual</text>
  </g>
  <g>
    <rect x="693" y="610" width="195" height="126" fill="#161b22" stroke="#232a35"/>
    <text x="705" y="631" class="kh">OPS · TXN</text>
    <text x="705" y="651" class="kb">inverse ops · rollback</text>
    <text x="705" y="668" class="kb">validate gate</text>
    <text x="705" y="685" class="kb">atomic write · checkpoints</text>
    <text x="705" y="702" class="kb">undo journal · provenance</text>
    <text x="705" y="723" class="note amber">the write mediator</text>
  </g>
  <g>
    <rect x="904" y="610" width="195" height="126" fill="#161b22" stroke="#232a35"/>
    <text x="916" y="631" class="kh">VAULT MODEL</text>
    <text x="916" y="651" class="kb">manifest · <tspan class="mono">vault.yaml</tspan></text>
    <text x="916" y="668" class="kb">taxonomy · organize</text>
    <text x="916" y="685" class="kb">frontmatter · plans</text>
    <text x="916" y="702" class="kb">paths · rename (graph-safe)</text>
    <text x="916" y="723" class="note">source-drift hashes</text>
  </g>

  <path d="M307,748 L307,783" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="315" y="770" class="note">apply ops</text>

  <!-- ============ WRITE BACKEND ============ -->
  <text x="44" y="776" class="band">WRITE BACKEND</text>
  <rect x="44" y="786" width="526" height="50" fill="#161b22" stroke="#30363d"/>
  <text x="60" y="807" class="hdr">fs backend <tspan class="cy" font-size="9" font-weight="700">DEFAULT</tspan></text>
  <text x="60" y="825" class="sub">headless filesystem · portable · git-friendly</text>
  <rect x="590" y="786" width="526" height="50" fill="#161b22" stroke="#30363d"/>
  <text x="606" y="807" class="hdr">cli backend</text>
  <text x="606" y="825" class="sub">live Obsidian desktop via CDP · live cache + rollback</text>

  <path d="M307,836 L307,869" stroke="#38bdf8" stroke-width="1.6" fill="none" marker-end="url(#ac)"/>
  <text x="315" y="856" class="note">write</text>

  <!-- ============ PERSISTENCE ============ -->
  <text x="44" y="862" class="band">PERSISTENCE</text>
  <rect x="44" y="872" width="636" height="58" fill="#12161d" stroke="#30363d"/>
  <text x="60" y="894" class="hdr">Vault <tspan class="sub" font-weight="400">— your markdown files</tspan></text>
  <text x="60" y="913" class="sub">Obsidian <tspan class="mono">.obsidian/</tspan> (verbatim)  ·  or repo mode <tspan class="mono">docs/silica/</tspan></text>
  <rect x="700" y="872" width="416" height="58" fill="#12161d" stroke="#30363d"/>
  <text x="716" y="894" class="hdr"><tspan class="mono">~/.silica</tspan> index <tspan class="sub" font-weight="400">— separate from your files</tspan></text>
  <text x="716" y="913" class="sub">embeddings <tspan class="mono">.npz</tspan> · co-occurrence · ledgers · undo journal</text>

  <!-- index read-back into kernel -->
  <path d="M908,872 L908,750" stroke="#6e7681" stroke-width="1.2" fill="none" stroke-dasharray="4 3" marker-end="url(#ad)"/>
  <text x="914" y="812" class="note">read index</text>

  <!-- footer safety line -->
  <line x1="44" y1="952" x2="1116" y2="952" stroke="#30363d"/>
  <text x="44" y="972" class="leg"><tspan class="amber" font-weight="700">Safety rails:</tspan> zero-trust ingress · post-write verify gate (revert on mismatch) · inverse-op rollback · <tspan class="mono">/undo</tspan> · <tspan class="mono">/revert</tspan> · git snapshot (<tspan class="mono">SILICA_GIT_COMMIT=auto</tspan>).</text>
</svg>
