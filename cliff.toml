# git-cliff configuration — generates a changelog from Conventional Commits.
# Full release changelog:   git cliff -o CHANGELOG.md
# Notes for the latest tag:  git cliff --latest --strip header
[changelog]
header = """
# Changelog

All notable changes to Silica are documented here.
This file is generated from Conventional Commits; do not edit by hand.\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^build|^ci", group = "Build & CI" },
  { message = "^chore|^style|^cleanup", skip = true },
  { body = ".*security", group = "Security" },
]
